name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/
          # Required so npm associates the token with this scope (otherwise publish can ENEEDAUTH).
          scope: "@dartix-software-solutions"

      - name: Ensure NPM_TOKEN secret is set
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Add repository secret NPM_TOKEN (npm automation token with publish access) under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($VERSION) does not match tag ($GITHUB_REF_NAME). Bump version, commit, then tag v$VERSION."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
